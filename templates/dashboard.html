<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 80%; margin: auto; }
        .header { background: #4CAF50; color: white; padding: 10px 0; text-align: center; }
        .stats { display: flex; justify-content: space-around; padding: 20px 0; }
        .stat { border: 1px solid #ddd; padding: 10px; text-align: center; width: 30%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Dashboard</h1>
        </div>
        <div class="stats">
            <div class="stat">
                <h2>Total Visitors</h2>
                <p>1000</p>
            </div>
            <div class="stat">
                <h2>Unique Visitors</h2>
                <p>800</p>
            </div>
            <div class="stat">
                <h2>Page Views</h2>
                <p>5000</p>
            </div>
        </div>
    </div>
</body>
</html>
